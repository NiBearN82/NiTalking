<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>與尼交心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:     #090D16;
  --panel:  #0C1220;
  --border: rgba(255,255,255,0.06);
  --text:   #EAE6DE;
  --dim:    rgba(255,255,255,0.28);
  --gold:   #C9A84C;
  --s:      #51A8DD;
  --c:      #E8963A;
}

html, body { height:100%; overflow:hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  display: flex;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* ═══ LEFT PANEL ═══ */
.left {
  width: 340px;
  flex-shrink: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
}

.left-scroll {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  padding: 28px 24px 24px;
  gap: 22px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

/* Title */
.logo-eye {
  font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
  transition: color 0.6s;
}
body.solo   .logo-eye { color: rgba(81,168,221,0.55); }
body.collab .logo-eye { color: rgba(232,150,58,0.6); }
.logo-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px; font-weight: 600; letter-spacing: 5px;
  margin-top: 6px; transition: all 0.6s;
}
body.solo   .logo-title { background:linear-gradient(135deg,#EDE9E2,#7EC8F0,#D4A84C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
body.collab .logo-title { background:linear-gradient(135deg,#EDE9E2,#F5C070,#E8963A); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.logo-sub {
  font-size: 11px; color: var(--dim); letter-spacing: 1px; margin-top: 4px;
  transition: opacity 0.3s;
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 50px; padding: 4px; gap: 3px;
}
.mode-btn {
  flex: 1; padding: 9px 0;
  border-radius: 50px; border: none; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px; letter-spacing: 2px;
  background: transparent; color: var(--dim);
  transition: all 0.3s;
}
body.solo   .mode-btn.m-solo   { background: rgba(81,168,221,0.16); color: #7EC8F0; }
body.collab .mode-btn.m-collab { background: rgba(232,150,58,0.18); color: #F5C070; }

/* Difficulty filter */
.section-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(255,255,255,0.2); margin-bottom: 8px;
}
.filter-list { display: flex; flex-direction: column; gap: 4px; }
.f-btn {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 10px;
  border: 1px solid transparent;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; cursor: pointer;
  color: var(--dim); transition: all 0.2s;
  text-align: left;
}
.f-btn:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55); }
.f-btn .f-stars { font-size: 11px; color: rgba(201,168,76,0.4); transition: color 0.2s; }
.f-btn .f-count { font-size: 10px; color: rgba(255,255,255,0.15); font-family: monospace; }

body.solo   .f-btn.on { background: rgba(81,168,221,0.1); border-color: rgba(81,168,221,0.3); color: #7EC8F0; }
body.collab .f-btn.on { background: rgba(232,150,58,0.1); border-color: rgba(232,150,58,0.3); color: #F5C070; }
.f-btn.on .f-stars { color: var(--gold); }

/* Stats */
.stats-row { display: flex; gap: 0; }
.stat-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 14px 8px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
}
.stat-item:first-child { border-radius: 10px 0 0 10px; }
.stat-item:last-child  { border-radius: 0 10px 10px 0; border-left: none; }
.stat-item:not(:first-child):not(:last-child) { border-left: none; }
.s-val {
  font-family: 'Noto Serif TC', serif;
  font-size: 26px; font-weight: 600; transition: color 0.6s;
}
body.solo   .s-val { color: var(--s); }
body.collab .s-val { color: var(--c); }
.s-lbl { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.2); }

/* Draw button */
.btn-draw {
  width: 100%; padding: 16px;
  border: none; border-radius: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px; letter-spacing: 4px;
  color: #fff; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.btn-draw::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.btn-draw:hover { transform: translateY(-1px); }
.btn-draw:hover::after { opacity: 1; }
.btn-draw:active { transform: none; }
.btn-draw:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
body.solo   .btn-draw { background: linear-gradient(135deg, #51A8DD, #3A8DC4); box-shadow: 0 4px 20px rgba(81,168,221,0.3); }
body.collab .btn-draw { background: linear-gradient(135deg, #E8963A, #C97820); box-shadow: 0 4px 20px rgba(232,150,58,0.3); }
body.solo   .btn-draw:not(:disabled):hover { box-shadow: 0 6px 28px rgba(81,168,221,0.45); }
body.collab .btn-draw:not(:disabled):hover { box-shadow: 0 6px 28px rgba(232,150,58,0.45); }

.btn-reset {
  width: 100%; padding: 10px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; color: var(--dim);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 12px; letter-spacing: 1px;
  cursor: pointer; transition: all 0.2s;
}
.btn-reset:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.55); }

/* History */
.hist-rule { height: 1px; background: var(--border); }
.hist-list { display: flex; flex-direction: column; gap: 6px; }
.h-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 11px 14px;
  display: flex; gap: 10px; align-items: flex-start;
  animation: up 0.3s ease;
}
@keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.h-stars { color: var(--gold); font-size: 9px; flex-shrink: 0; margin-top: 3px; }
.h-q { font-family: 'Noto Serif TC', serif; font-size: 12px; color: rgba(234,232,226,0.45); line-height: 1.7; }
.hist-empty { font-size: 11px; letter-spacing: 1px; color: rgba(255,255,255,0.15); text-align: center; padding: 20px 0; }

/* ═══ RIGHT PANEL ═══ */
.right {
  flex: 1;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.right::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  transition: background 0.8s;
}
body.solo   .right::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(81,168,221,0.06) 0%, transparent 70%); }
body.collab .right::before { background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(232,150,58,0.07) 0%, transparent 70%); }

/* ═══ CARD SCENE ═══ */
.scene {
  width: min(460px, calc(100% - 64px));
  perspective: 1400px;
  position: relative;
  z-index: 1;
}
.inner {
  width: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.85s cubic-bezier(0.4,0,0.2,1);
}
.inner.flipped { transform: rotateY(180deg); }

.face {
  width: 100%; border-radius: 24px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* Back face */
.back {
  height: 500px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  border: 1px solid rgba(255,255,255,0.07);
  position: relative;
  transition: background 0.8s, box-shadow 0.8s;
}
body.solo   .back { background: #0D1825; box-shadow: 0 0 50px rgba(81,168,221,0.07), 0 32px 80px rgba(0,0,0,0.7); }
body.collab .back { background: #1A1208; box-shadow: 0 0 50px rgba(232,150,58,0.07), 0 32px 80px rgba(0,0,0,0.7); }
.back::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg,transparent,transparent 30px,rgba(255,255,255,0.01) 30px,rgba(255,255,255,0.01) 60px);
}
.back-ring {
  width: 120px; height: 120px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; position: relative;
  transition: border-color 0.8s;
}
body.solo   .back-ring { border: 1px solid rgba(81,168,221,0.2); }
body.collab .back-ring { border: 1px solid rgba(232,150,58,0.25); }
.back-ring::before {
  content: ''; position: absolute; width: 96px; height: 96px; border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.13);
}
.back-sym {
  font-family: 'Noto Serif TC', serif; font-size: 36px; z-index: 1;
  transition: color 0.8s;
}
body.solo   .back-sym { color: rgba(81,168,221,0.38); }
body.collab .back-sym { color: rgba(232,150,58,0.5); }
.back-sub { font-size: 11px; letter-spacing: 3px; transition: color 0.8s; }
body.solo   .back-sub { color: rgba(81,168,221,0.32); }
body.collab .back-sub { color: rgba(232,150,58,0.42); }
.back-hint { position: absolute; bottom: 24px; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.12); }

/* Front face */
.front {
  position: absolute; top: 0; left: 0; width: 100%;
  transform: rotateY(180deg);
  display: flex; flex-direction: column;
  padding: 36px 40px 32px;
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 24px;
  transition: background 0.8s, box-shadow 0.8s;
}
body.solo   .front { background: #111C2E; box-shadow: 0 0 70px rgba(81,168,221,0.12), 0 32px 80px rgba(0,0,0,0.7); }
body.collab .front { background: #1C1408; box-shadow: 0 0 70px rgba(232,150,58,0.12), 0 32px 80px rgba(0,0,0,0.7); }
.front::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: 24px 24px 0 0; transition: background 0.8s;
}
body.solo   .front::before { background: linear-gradient(90deg,transparent,rgba(81,168,221,0.7),rgba(201,168,76,0.5),rgba(81,168,221,0.7),transparent); }
body.collab .front::before { background: linear-gradient(90deg,transparent,rgba(232,150,58,0.8),rgba(240,200,100,0.6),rgba(232,150,58,0.8),transparent); }

.card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
.card-cat { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; transition: color 0.8s; }
body.solo   .card-cat { color: rgba(81,168,221,0.65); }
body.collab .card-cat { color: rgba(232,150,58,0.7); }
.card-stars .st-on  { font-size: 14px; color: var(--gold); }
.card-stars .st-off { font-size: 14px; color: rgba(255,255,255,0.1); }

/* THE QUESTION */
.card-q {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(22px, 2.8vw, 32px);
  line-height: 1.9; letter-spacing: 1.5px;
  color: var(--text);
  padding-bottom: 24px;
}

/* Discussion (collab only) */
.discussion {
  display: none;
  flex-direction: column; gap: 11px;
  padding-top: 22px;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 4px;
}
body.collab .discussion { display: flex; }
.disc-label {
  font-size: 9px; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(232,150,58,0.5); margin-bottom: 2px;
}
.disc-item { display: flex; gap: 12px; align-items: flex-start; }
.disc-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(232,150,58,0.4); flex-shrink: 0; margin-top: 8px;
}
.disc-text {
  font-size: clamp(13px, 1.6vw, 15px);
  line-height: 1.75; letter-spacing: 0.5px;
  color: rgba(234,232,226,0.5);
}

.card-foot {
  margin-top: auto; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; justify-content: space-between; align-items: center;
}
.foot-tier { font-size: 10px; color: rgba(255,255,255,0.18); letter-spacing: 1px; }
.foot-num  { font-size: 10px; color: rgba(255,255,255,0.1); font-family: monospace; }

/* mobile fallback */
@media(max-width:760px){
  body { flex-direction: column; overflow: auto; height: auto; }
  .left { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .left-scroll { padding: 20px 18px; }
  .right { height: 600px; }
}
</style>
</head>
<body class="solo">

<!-- ═══ LEFT PANEL ═══ -->
<aside class="left">
  <div class="left-scroll">

    <!-- Logo -->
    <div>
      <div class="logo-eye">NIBEL HEARTFELT SERIES</div>
      <div class="logo-title">與尼交心</div>
      <div class="logo-sub" id="logoSub">抽一張卡，說一句真心話</div>
    </div>

    <!-- Mode -->
    <div class="mode-toggle">
      <button class="mode-btn m-solo"   onclick="setMode('solo')">個 人</button>
      <button class="mode-btn m-collab" onclick="setMode('collab')">雙 人</button>
    </div>

    <!-- Filter -->
    <div>
      <div class="section-label">難度</div>
      <div class="filter-list">
        <button class="f-btn on" onclick="setFilter(0,this)">
          <span>全部卡牌</span>
          <span class="f-count" id="cnt0"></span>
        </button>
        <button class="f-btn" onclick="setFilter(1,this)">
          <span><span class="f-stars">★</span>  輕鬆開場</span>
          <span class="f-count" id="cnt1"></span>
        </button>
        <button class="f-btn" onclick="setFilter(2,this)">
          <span><span class="f-stars">★★</span>  深入一些</span>
          <span class="f-count" id="cnt2"></span>
        </button>
        <button class="f-btn" onclick="setFilter(3,this)">
          <span><span class="f-stars">★★★</span>  靠近彼此</span>
          <span class="f-count" id="cnt3"></span>
        </button>
        <button class="f-btn" onclick="setFilter(4,this)">
          <span><span class="f-stars">★★★★</span>  核心交心</span>
          <span class="f-count" id="cnt4"></span>
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item"><div class="s-val" id="sDrawn">0</div><div class="s-lbl">已抽出</div></div>
      <div class="stat-item"><div class="s-val" id="sRemain">0</div><div class="s-lbl">剩餘</div></div>
      <div class="stat-item"><div class="s-val" id="sTotal">0</div><div class="s-lbl">全部</div></div>
    </div>

    <!-- Buttons -->
    <button class="btn-draw" id="btnDraw" onclick="draw()">抽 牌</button>
    <button class="btn-reset" onclick="reset()">重新洗牌</button>

    <!-- History -->
    <div class="hist-rule"></div>
    <div>
      <div class="section-label">本場紀錄</div>
      <div class="hist-list" id="histList">
        <div class="hist-empty" id="histEmpty">還沒有抽過任何卡牌</div>
      </div>
    </div>

  </div>
</aside>

<!-- ═══ RIGHT PANEL ═══ -->
<main class="right">
  <div class="scene" id="scene">
    <div class="inner" id="inner">

      <!-- Back -->
      <div class="face back">
        <div class="back-ring"><div class="back-sym" id="backSym">心</div></div>
        <div class="back-sub" id="backSub">與尼交心</div>
        <div class="back-hint">按「抽牌」開始</div>
      </div>

      <!-- Front -->
      <div class="face front" id="front">
        <div class="card-top">
          <div class="card-cat"   id="cCat"></div>
          <div class="card-stars" id="cStars"></div>
        </div>
        <div class="card-q" id="cQ"></div>
        <div class="discussion" id="cDisc">
          <div class="disc-label">延伸討論</div>
          <div class="disc-item"><div class="disc-dot"></div><div class="disc-text" id="cD1"></div></div>
          <div class="disc-item"><div class="disc-dot"></div><div class="disc-text" id="cD2"></div></div>
          <div class="disc-item" id="d3row" style="display:none"><div class="disc-dot"></div><div class="disc-text" id="cD3"></div></div>
        </div>
        <div class="card-foot">
          <div class="foot-tier" id="cTier"></div>
          <div class="foot-num"  id="cNum"></div>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════
// CARD DATA  (160 cards, 40 per level)
// Difficulty guide:
// ★  = 輕鬆開場 — 10秒內可答，不需深思，像聊天開場白
// ★★ = 深入一些 — 需稍微回想，有觀點可分享，但不觸碰傷感
// ★★★= 靠近彼此 — 涉及關係、情緒、身分認同，需信任感
// ★★★★= 核心交心 — 觸及核心恐懼、意義、深層需求
// ═══════════════════════════════════════════════════════════
const CARDS = [

// ───────────────────────────────────────
// ★  輕鬆開場（40 張）
// ───────────────────────────────────────
{id:'S01',lv:1,cat:'當下狀態',    q:'今天的心情，如果用一種食物來形容是什麼？',
 d:['為什麼是這個食物？今天發生了什麼嗎？','如果明天可以換一種，你希望是什麼？']},
{id:'S02',lv:1,cat:'生活觀察',    q:'最近有什麼讓你笑出聲的事情？',
 d:['你通常是很容易笑，還是很難被逗笑的人？','說給對方聽，看他笑不笑得出來。']},
{id:'S03',lv:1,cat:'感官記憶',    q:'有沒有一首歌，每次聽都能把你帶回某個畫面？',
 d:['那個畫面是快樂的，還是有點傷感的？','你現在還常聽那首歌嗎？']},
{id:'S04',lv:1,cat:'自我照顧',    q:'如果今天只能做一件讓自己快樂的事，你會選什麼？',
 d:['這件事你多久沒有好好做了？','什麼原因讓你沒辦法常常做這件事？']},
{id:'S05',lv:1,cat:'節奏感',      q:'如果今天的你是一首歌，是快歌還是慢歌？',
 d:['有沒有一首具體的歌，最接近你今天的感覺？','你平常大多數時候是快歌狀態還是慢歌狀態？']},
{id:'S06',lv:1,cat:'小小享受',    q:'你有沒有一個「沒什麼道理但就是很爽」的小習慣？',
 d:['如果被人發現了，你會不會覺得尷尬？','你猜對方有什麼樣的小習慣？']},
{id:'S07',lv:1,cat:'期待感',      q:'最近讓你最期待的事情是什麼？',
 d:['這件事是確定會發生的，還是還不確定？','如果最後沒發生，你會怎麼樣？']},
{id:'S08',lv:1,cat:'微小確幸',    q:'最近有沒有讓你覺得「世界也沒那麼差」的小事？',
 d:['那是自己經歷的，還是旁觀到別人的？','你平常是容易被這種小事感動的人嗎？']},
{id:'S09',lv:1,cat:'睡前時光',    q:'你最近睡得好嗎？睡前通常在想什麼？',
 d:['那些睡前的想法，是讓你安心還是讓你煩惱的？','你有沒有讓自己比較好入睡的方式？']},
{id:'S10',lv:1,cat:'空閒時光',    q:'無聊的時候，你有什麼必做的事？',
 d:['這件事是「真的想做」還是「只是填滿空白」？','你有沒有想過改掉這個習慣？']},
{id:'S11',lv:1,cat:'新發現',      q:'最近有沒有一個「這東西真的很好」的新喜愛？',
 d:['你是怎麼發現它的？','你會主動把它推薦給朋友嗎？']},

// ═══════════════════════════════════════
const TIERS = {1:'輕鬆開場',2:'深入一些',3:'靠近彼此',4:'核心交心'};

let mode   = 'solo';
let filter = 0;
let drawn  = new Set();
let flip   = false;
let busy   = false;

function getBase() {
  return filter===0 ? CARDS : CARDS.filter(c=>c.lv===filter);
}
function pool() {
  return getBase().filter(c=>!drawn.has(c.id));
}

function updateStats() {
  const base = getBase();
  const dn   = base.filter(c=>drawn.has(c.id)).length;
  const rem  = base.length - dn;
  document.getElementById('sDrawn').textContent  = dn;
  document.getElementById('sRemain').textContent = rem;
  document.getElementById('sTotal').textContent  = base.length;
  document.getElementById('btnDraw').disabled    = rem===0;
}

function updateCounts() {
  for(let lv=0;lv<=4;lv++){
    const total = lv===0 ? CARDS.length : CARDS.filter(c=>c.lv===lv).length;
    document.getElementById(`cnt${lv}`).textContent = total+'張';
  }
}

function starsHTML(lv) {
  let h='';
  for(let i=1;i<=4;i++) h+=`<span class="${i<=lv?'st-on':'st-off'}">★</span>`;
  return h;
}

function populate(card) {
  document.getElementById('cCat').textContent  = card.cat;
  document.getElementById('cStars').innerHTML  = starsHTML(card.lv);
  document.getElementById('cQ').textContent    = card.q;
  document.getElementById('cD1').textContent   = card.d[0];
  document.getElementById('cD2').textContent   = card.d[1];
  const d3 = card.d[2]||'';
  document.getElementById('cD3').textContent   = d3;
  document.getElementById('d3row').style.display = d3?'flex':'none';
  document.getElementById('cTier').textContent = TIERS[card.lv];
  document.getElementById('cNum').textContent  = `NO.${card.id}`;
  syncHeight();
}

function syncHeight() {
  requestAnimationFrame(()=>{
    const fr = document.getElementById('front');
    const sc = document.getElementById('scene');
    const in_el = document.getElementById('inner');
    const bk = document.querySelector('.back');
    const min = 500;
    const h  = Math.max(min, fr.scrollHeight+2);
    sc.style.height     = h+'px';
    in_el.style.height  = h+'px';
    bk.style.height     = h+'px';
  });
}

function draw() {
  if(busy) return;
  const p=pool();
  if(!p.length) return;
  busy=true;
  const card=p[Math.floor(Math.random()*p.length)];
  if(flip){
    document.getElementById('inner').classList.remove('flipped');
    setTimeout(()=>{ populate(card); setTimeout(()=>reveal(card),200); },460);
  } else {
    populate(card); reveal(card);
  }
}

function reveal(card) {
  document.getElementById('inner').classList.add('flipped');
  flip=true;
  drawn.add(card.id);
  updateStats();
  addHistory(card);
  setTimeout(()=>{ busy=false; },900);
}

function addHistory(card) {
  document.getElementById('histEmpty').style.display='none';
  const list=document.getElementById('histList');
  const d=document.createElement('div');
  d.className='h-item';
  let s=''; for(let i=0;i<card.lv;i++) s+='★';
  d.innerHTML=`<div class="h-stars">${s}</div><div class="h-q">${card.q}</div>`;
  list.insertBefore(d,list.firstChild);
}

function reset() {
  if(busy) return;
  drawn.clear(); flip=false; busy=false;
  document.getElementById('inner').classList.remove('flipped');
  document.getElementById('histList').innerHTML='<div class="hist-empty" id="histEmpty">還沒有抽過任何卡牌</div>';
  syncHeight();
  updateStats();
}

function setFilter(lv,btn) {
  filter=lv;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateStats();
}

function setMode(m) {
  if(m===mode) return;
  mode=m;
  document.body.className=m;
  document.getElementById('logoSub').textContent = m==='solo'
    ?'抽一張卡，說一句真心話'
    :'兩個人的對話，比一個人更深刻';
  document.getElementById('backSym').textContent = m==='solo'?'心':'連';
  syncHeight();
}

updateCounts();
updateStats();
syncHeight();
</script>
