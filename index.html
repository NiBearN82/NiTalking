<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>與尼交心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #090D16;
  color: #EAE6DE;
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 16px 64px;
}

body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  transition: background 0.9s;
}
body.solo  ::before { background: radial-gradient(ellipse 65% 32% at 50% 0%, rgba(81,168,221,0.09) 0%, transparent 70%); }
body.collab::before { background: radial-gradient(ellipse 65% 32% at 50% 0%, rgba(200,130,50,0.10) 0%, transparent 70%); }
body.solo::before  { background: radial-gradient(ellipse 65% 32% at 50% 0%, rgba(81,168,221,0.09) 0%, transparent 70%); }
body.collab::before{ background: radial-gradient(ellipse 65% 32% at 50% 0%, rgba(200,130,50,0.10) 0%, transparent 70%); }

/* ── MODE TOGGLE ── */
.mode-wrap { position:relative; z-index:10; padding-top:28px; }
.mode-toggle {
  display:flex; background:#0F1520;
  border:1px solid rgba(255,255,255,0.07); border-radius:60px; padding:5px;
}
.mode-btn {
  padding:10px 30px; border-radius:50px; border:none; cursor:pointer;
  font-family:'Noto Sans TC',sans-serif; font-size:13px; letter-spacing:2px;
  background:transparent; color:rgba(255,255,255,0.3); transition:all 0.35s;
}
body.solo   .mode-btn.m-solo   { background:rgba(81,168,221,0.15); color:#7EC8F0; }
body.collab .mode-btn.m-collab { background:rgba(200,130,50,0.18);  color:#F5C070; }

/* ── TITLE ── */
.title-wrap {
  position:relative; z-index:10;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding-top:20px;
}
.title-eye {
  font-size:10px; letter-spacing:4px; text-transform:uppercase;
  transition:color 0.7s;
}
body.solo   .title-eye { color:rgba(81,168,221,0.6); }
body.collab .title-eye { color:rgba(200,130,50,0.7); }
h1 {
  font-family:'Noto Serif TC',serif; font-size:clamp(28px,6vw,40px);
  font-weight:600; letter-spacing:8px; transition:all 0.7s;
}
body.solo   h1 { background:linear-gradient(135deg,#EDE9E2,#7EC8F0,#D4A84C); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
body.collab h1 { background:linear-gradient(135deg,#EDE9E2,#F5C070,#E8963A); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.title-sub { font-size:12px; color:rgba(255,255,255,0.2); letter-spacing:2px; }

/* ── FILTER ── */
.filter-wrap {
  position:relative; z-index:10;
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  padding-top:18px;
}
.f-btn {
  padding:7px 17px; border-radius:50px;
  border:1px solid rgba(255,255,255,0.07); background:#0F1520;
  font-family:'Noto Sans TC',sans-serif; font-size:12px; letter-spacing:1px;
  color:rgba(255,255,255,0.3); cursor:pointer; transition:all 0.2s;
}
.f-btn:hover { color:rgba(255,255,255,0.55); }
body.solo   .f-btn.on { background:rgba(81,168,221,0.13); border-color:rgba(81,168,221,0.4); color:#7EC8F0; }
body.collab .f-btn.on { background:rgba(200,130,50,0.14); border-color:rgba(200,130,50,0.45);color:#F5C070; }

/* ── STATS ── */
.stats {
  position:relative; z-index:10;
  display:flex; gap:20px; align-items:center; padding-top:18px;
}
.s-item { display:flex; flex-direction:column; align-items:center; gap:3px; }
.s-val {
  font-family:'Noto Serif TC',serif; font-size:24px; font-weight:600; transition:color 0.7s;
}
body.solo   .s-val { color:#51A8DD; }
body.collab .s-val { color:#E8963A; }
.s-lbl { font-size:9px; letter-spacing:2px; color:rgba(255,255,255,0.22); }
.s-sep { width:1px; height:24px; background:rgba(255,255,255,0.07); }

/* ── CARD SCENE ── */
.scene {
  position:relative; z-index:10;
  width:min(440px, calc(100vw - 32px));
  perspective:1400px;
  margin-top:22px;
  /* height is dynamic via JS */
}

.inner {
  width:100%;
  position:relative; transform-style:preserve-3d;
  transition:transform 0.85s cubic-bezier(0.4,0,0.2,1);
}
.inner.flipped { transform:rotateY(180deg); }

.face {
  width:100%; border-radius:24px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* Back */
.back {
  height:480px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  border:1px solid rgba(255,255,255,0.07); transition:background 0.9s, box-shadow 0.9s;
  position:relative;
}
body.solo   .back { background:#0D1825; box-shadow:0 0 50px rgba(81,168,221,0.07),0 28px 72px rgba(0,0,0,0.7); }
body.collab .back { background:#1A1208; box-shadow:0 0 50px rgba(200,130,50,0.07), 0 28px 72px rgba(0,0,0,0.7); }
.back::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(-45deg,transparent,transparent 28px,rgba(255,255,255,0.012) 28px,rgba(255,255,255,0.012) 56px);
}
.back-ring {
  width:108px; height:108px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; position:relative;
  transition:border-color 0.9s;
}
body.solo   .back-ring { border:1px solid rgba(81,168,221,0.22); }
body.collab .back-ring { border:1px solid rgba(200,130,50,0.28); }
.back-ring::before {
  content:''; position:absolute; width:86px; height:86px; border-radius:50%;
  border:1px solid rgba(201,168,76,0.14);
}
.back-sym {
  font-family:'Noto Serif TC',serif; font-size:32px; z-index:1; transition:color 0.9s;
}
body.solo   .back-sym { color:rgba(81,168,221,0.4); }
body.collab .back-sym { color:rgba(200,130,50,0.55); }
.back-sub { font-size:11px; letter-spacing:3px; transition:color 0.9s; }
body.solo   .back-sub { color:rgba(81,168,221,0.35); }
body.collab .back-sub { color:rgba(200,130,50,0.45); }
.back-hint { position:absolute; bottom:22px; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.12); }

/* Front */
.front {
  position:absolute; top:0; left:0; width:100%;
  transform:rotateY(180deg);
  display:flex; flex-direction:column;
  padding:32px 36px 28px;
  border:1px solid rgba(255,255,255,0.09);
  transition:background 0.9s, box-shadow 0.9s;
}
body.solo   .front { background:#111C2E; box-shadow:0 0 60px rgba(81,168,221,0.11),0 28px 72px rgba(0,0,0,0.7); }
body.collab .front { background:#1C1408; box-shadow:0 0 60px rgba(200,130,50,0.11), 0 28px 72px rgba(0,0,0,0.7); }
.front::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px; transition:background 0.9s;
}
body.solo   .front::before { background:linear-gradient(90deg,transparent,rgba(81,168,221,0.65),rgba(201,168,76,0.5),rgba(81,168,221,0.65),transparent); }
body.collab .front::before { background:linear-gradient(90deg,transparent,rgba(200,130,50,0.75),rgba(240,200,100,0.6),rgba(200,130,50,0.75),transparent); }

/* Card top row */
.card-top {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;
}
.card-cat { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; transition:color 0.9s; }
body.solo   .card-cat { color:rgba(81,168,221,0.65); }
body.collab .card-cat { color:rgba(200,130,50,0.75); }
.card-stars .st-on  { font-size:13px; color:#C9A84C; }
.card-stars .st-off { font-size:13px; color:rgba(255,255,255,0.1); }

/* THE QUESTION — big */
.card-q {
  font-family:'Noto Serif TC',serif;
  font-size:clamp(21px, 5vw, 27px);
  line-height:1.9; letter-spacing:1.5px;
  color:#EAE6DE;
}

/* Discussion prompts — collab only */
.discussion {
  margin-top:24px;
  padding-top:22px;
  border-top:1px solid rgba(255,255,255,0.07);
  display:none;
  flex-direction:column;
  gap:12px;
}
body.collab .discussion { display:flex; }

.disc-label {
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:rgba(200,130,50,0.5); margin-bottom:2px;
}
.disc-item {
  display:flex; gap:10px; align-items:flex-start;
}
.disc-bullet {
  width:5px; height:5px; border-radius:50%;
  background:rgba(200,130,50,0.45); flex-shrink:0; margin-top:7px;
}
.disc-text {
  font-size:14px; line-height:1.75; letter-spacing:0.5px;
  color:rgba(234,232,226,0.55);
}

.card-foot {
  margin-top:22px; padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex; justify-content:space-between;
}
.foot-tier { font-size:10px; color:rgba(255,255,255,0.18); letter-spacing:1px; }
.foot-num  { font-size:10px; color:rgba(255,255,255,0.1);  font-family:monospace; }

/* ── BUTTONS ── */
.btns {
  position:relative; z-index:10;
  display:flex; gap:12px; align-items:center; margin-top:24px; flex-wrap:wrap; justify-content:center;
}
.btn-main {
  padding:16px 54px; border:none; border-radius:60px;
  font-family:'Noto Sans TC',sans-serif; font-size:15px; letter-spacing:4px;
  color:#fff; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden;
}
.btn-main::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);
  opacity:0; transition:opacity 0.3s;
}
.btn-main:hover { transform:translateY(-2px); }
.btn-main:hover::after { opacity:1; }
.btn-main:active { transform:translateY(0); }
.btn-main:disabled { opacity:0.3; cursor:not-allowed; transform:none; }
body.solo   .btn-main { background:linear-gradient(135deg,#51A8DD,#3A8DC4); box-shadow:0 4px 24px rgba(81,168,221,0.35); }
body.collab .btn-main { background:linear-gradient(135deg,#E8963A,#C97820); box-shadow:0 4px 24px rgba(232,150,58,0.35); }
body.solo   .btn-main:not(:disabled):hover { box-shadow:0 8px 32px rgba(81,168,221,0.5); }
body.collab .btn-main:not(:disabled):hover { box-shadow:0 8px 32px rgba(232,150,58,0.5); }
.btn-sub {
  padding:14px 20px; background:transparent;
  border:1px solid rgba(255,255,255,0.1); border-radius:60px;
  color:rgba(255,255,255,0.28); font-family:'Noto Sans TC',sans-serif;
  font-size:12px; letter-spacing:1px; cursor:pointer; transition:all 0.25s;
}
.btn-sub:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.6); }

/* ── HISTORY ── */
.history {
  position:relative; z-index:10;
  width:100%; max-width:480px; margin-top:36px;
}
.hist-head { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.hist-title { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.2); white-space:nowrap; }
.hist-line  { flex:1; height:1px; background:rgba(255,255,255,0.06); }
.hist-list  { display:flex; flex-direction:column; gap:8px; }
.h-item {
  background:#0F1520; border:1px solid rgba(255,255,255,0.06);
  border-radius:12px; padding:14px 18px;
  display:flex; gap:12px; align-items:flex-start;
  animation:up 0.35s ease;
}
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.h-stars { color:#C9A84C; font-size:10px; flex-shrink:0; margin-top:3px; }
.h-q { font-family:'Noto Serif TC',serif; font-size:13px; color:rgba(234,232,226,0.5); line-height:1.7; }
.empty { text-align:center; padding:24px; font-size:12px; letter-spacing:1px; color:rgba(255,255,255,0.15); }

@media(max-width:480px){
  .front { padding:26px 22px 22px; }
  .card-q { font-size:19px; }
  .disc-text { font-size:13px; }
}
</style>
</head>
<body class="solo">

<div class="mode-wrap">
  <div class="mode-toggle">
    <button class="mode-btn m-solo"   onclick="setMode('solo')">個 人</button>
    <button class="mode-btn m-collab" onclick="setMode('collab')">雙 人</button>
  </div>
</div>

<div class="title-wrap">
  <div class="title-eye">NIBEL HEARTFELT SERIES</div>
  <h1>與尼交心</h1>
  <div class="title-sub" id="titleSub">抽一張卡，說一句真心話</div>
</div>

<div class="filter-wrap">
  <button class="f-btn on" onclick="setFilter(0,this)">全部</button>
  <button class="f-btn" onclick="setFilter(1,this)">★ 輕鬆開場</button>
  <button class="f-btn" onclick="setFilter(2,this)">★★ 深入一些</button>
  <button class="f-btn" onclick="setFilter(3,this)">★★★ 靠近彼此</button>
  <button class="f-btn" onclick="setFilter(4,this)">★★★★ 核心交心</button>
</div>

<div class="stats">
  <div class="s-item"><div class="s-val" id="sDrawn">0</div><div class="s-lbl">已抽出</div></div>
  <div class="s-sep"></div>
  <div class="s-item"><div class="s-val" id="sRemain">0</div><div class="s-lbl">剩餘</div></div>
  <div class="s-sep"></div>
  <div class="s-item"><div class="s-val" id="sTotal">0</div><div class="s-lbl">全部</div></div>
</div>

<div class="scene" id="scene">
  <div class="inner" id="inner">
    <div class="face back">
      <div class="back-ring"><div class="back-sym" id="backSym">心</div></div>
      <div class="back-sub" id="backSub">與尼交心</div>
      <div class="back-hint">按「抽牌」開始</div>
    </div>
    <div class="face front" id="front">
      <div class="card-top">
        <div class="card-cat"   id="cCat"></div>
        <div class="card-stars" id="cStars"></div>
      </div>
      <div class="card-q" id="cQ"></div>
      <div class="discussion" id="cDisc">
        <div class="disc-label">延伸討論</div>
        <div class="disc-item"><div class="disc-bullet"></div><div class="disc-text" id="cD1"></div></div>
        <div class="disc-item"><div class="disc-bullet"></div><div class="disc-text" id="cD2"></div></div>
        <div class="disc-item" id="d3row"><div class="disc-bullet"></div><div class="disc-text" id="cD3"></div></div>
      </div>
      <div class="card-foot">
        <div class="foot-tier" id="cTier"></div>
        <div class="foot-num"  id="cNum"></div>
      </div>
    </div>
  </div>
</div>

<div class="btns">
  <button class="btn-main" id="btnDraw" onclick="draw()">抽 牌</button>
  <button class="btn-sub"  onclick="reset()">重新洗牌</button>
</div>

<div class="history">
  <div class="hist-head">
    <div class="hist-title">本場紀錄</div>
    <div class="hist-line"></div>
  </div>
  <div class="hist-list" id="histList">
    <div class="empty" id="emptyMsg">還沒有抽過任何卡牌</div>
  </div>
</div>

<script>
// 每張卡：主問題 + 雙人延伸討論（2-3條）
const CARDS = [
  // ★ 輕鬆開場
  { id:'01', lv:1, cat:'當下狀態',
    q:'今天的心情，如果用一種食物來形容是什麼？',
    d:['為什麼是這個食物？今天發生了什麼嗎？',
       '如果明天的你可以換一種，你希望是什麼食物？']},
  { id:'02', lv:1, cat:'生活觀察',
    q:'最近有什麼讓你笑出聲的事情？',
    d:['你通常是很容易笑，還是很難被逗笑的人？',
       '說給對方聽，看他笑不笑得出來。']},
  { id:'03', lv:1, cat:'感官記憶',
    q:'有沒有一首歌，每次聽都能把你帶回某個畫面？',
    d:['那個畫面是快樂的，還是有點傷感的？',
       '你現在還常聽那首歌嗎？']},
  { id:'04', lv:1, cat:'自我照顧',
    q:'如果今天只能做一件讓自己快樂的事，你會選什麼？',
    d:['這件事你多久沒有好好做了？',
       '是什麼原因讓你沒辦法常常做這件事？']},
  { id:'05', lv:1, cat:'狀態色彩',
    q:'如果用一個顏色代表你今天的狀態，你會選哪個？',
    d:['這是你喜歡的顏色嗎？',
       '你最希望自己常常是什麼顏色？']},
  { id:'06', lv:1, cat:'小小享受',
    q:'你有沒有一個「沒什麼道理但就是很爽」的小習慣？',
    d:['如果被人發現了，你會不會覺得尷尬？',
       '你猜對方有什麼樣的小習慣？']},
  { id:'07', lv:1, cat:'期待感',
    q:'最近讓你最期待的事情是什麼？',
    d:['這件事是確定會發生的，還是還不確定？',
       '如果最後沒發生，你會怎麼樣？']},
  { id:'08', lv:1, cat:'節奏感',
    q:'如果今天的你是一首歌，是快歌還是慢歌？',
    d:['有沒有一首具體的歌，最接近你今天的感覺？',
       '你平常大多數時候是快歌狀態還是慢歌狀態？']},
  { id:'09', lv:1, cat:'睡前時光',
    q:'你最近睡得好嗎？睡前通常在想什麼？',
    d:['那些睡前的想法，是讓你安心還是讓你煩惱的？',
       '你有沒有讓自己比較好入睡的方式？']},
  { id:'10', lv:1, cat:'微小確幸',
    q:'最近有沒有讓你覺得「世界也沒那麼差」的小事？',
    d:['那是自己經歷的，還是旁觀到別人的？',
       '你平常是容易被這種小事感動的人嗎？']},
  { id:'11', lv:1, cat:'空閒時光',
    q:'無聊的時候，你有什麼必做的事？',
    d:['這件事是「真的想做」還是「只是填滿空白」？',
       '你有沒有想過改掉這個習慣？']},
  { id:'12', lv:1, cat:'新發現',
    q:'最近有沒有一個「這東西真的很好」的新喜愛？',
    d:['你是怎麼發現它的？',
       '你會主動把它推薦給朋友嗎？']},
  { id:'13', lv:1, cat:'天氣心情',
    q:'你覺得現在的自己，最像哪種天氣？',
    d:['這是你喜歡的天氣嗎？',
       '你最喜歡的天氣是什麼？原因是？']},
  { id:'14', lv:1, cat:'說不出口',
    q:'你有沒有一個「下次再說」但一直沒說出口的話？',
    d:['是說給誰聽的？現在還說得出口嗎？',
       '是什麼讓你一直說不出來？']},
  { id:'15', lv:1, cat:'充電方式',
    q:'你最喜歡的充電方式是什麼？',
    d:['這個方式你多久沒有好好用過了？',
       '你有沒有一個「別人覺得不可思議，但你覺得很有效」的充電法？']},

  // ★★ 深入一些
  { id:'16', lv:2, cat:'人生轉折',
    q:'有沒有一個決定，現在回頭看覺得「幸好我做了」？',
    d:['當時你是怎麼做出這個決定的？靠直覺還是靠分析？',
       '如果當時沒做，你覺得現在會有什麼不同？']},
  { id:'17', lv:2, cat:'獨特快樂',
    q:'你有沒有一種「只有你懂」的快樂，很難跟別人解釋？',
    d:['你試著解釋給對方聽，看他能不能理解。',
       '你有沒有過因為這個快樂而被人覺得奇怪的經驗？']},
  { id:'18', lv:2, cat:'成長洞見',

const TIERS = {1:'輕鬆開場',2:'深入一些',3:'靠近彼此',4:'核心交心'};

let mode    = 'solo';
let filter  = 0;
let drawn   = new Set();
let flipped = false;
let busy    = false;

function pool() {
  const base = filter===0 ? CARDS : CARDS.filter(c=>c.lv===filter);
  return base.filter(c=>!drawn.has(c.id));
}

function updateStats() {
  const base = filter===0 ? CARDS : CARDS.filter(c=>c.lv===filter);
  const dNum = base.filter(c=>drawn.has(c.id)).length;
  const rem  = base.length - dNum;
  document.getElementById('sDrawn').textContent  = dNum;
  document.getElementById('sRemain').textContent = rem;
  document.getElementById('sTotal').textContent  = base.length;
  document.getElementById('btnDraw').disabled    = rem === 0;
}

function starsHTML(lv) {
  let h='';
  for(let i=1;i<=4;i++) h+=`<span class="${i<=lv?'st-on':'st-off'}">★</span>`;
  return h;
}

function populate(card) {
  document.getElementById('cCat').textContent   = card.cat;
  document.getElementById('cStars').innerHTML   = starsHTML(card.lv);
  document.getElementById('cQ').textContent     = card.q;
  document.getElementById('cD1').textContent    = card.d[0];
  document.getElementById('cD2').textContent    = card.d[1];
  const d3 = card.d[2] || '';
  document.getElementById('cD3').textContent    = d3;
  document.getElementById('d3row').style.display = d3 ? 'flex' : 'none';
  document.getElementById('cTier').textContent  = TIERS[card.lv];
  document.getElementById('cNum').textContent   = `NO.${card.id}`;
  // resize scene height to fit card
  resizeScene();
}

function resizeScene() {
  requestAnimationFrame(()=>{
    const front = document.getElementById('front');
    const scene = document.getElementById('scene');
    const inner = document.getElementById('inner');
    const h = mode==='collab'
      ? Math.max(460, front.scrollHeight + 2)
      : 480;
    scene.style.height = h + 'px';
    inner.style.height = h + 'px';
    document.querySelector('.back').style.height = h + 'px';
    front.style.borderRadius = '24px';
  });
}

function draw() {
  if (busy) return;
  const p = pool();
  if (!p.length) return;
  busy = true;
  const card = p[Math.floor(Math.random()*p.length)];

  if (flipped) {
    document.getElementById('inner').classList.remove('flipped');
    setTimeout(()=>{ populate(card); setTimeout(()=>reveal(card), 200); }, 460);
  } else {
    populate(card);
    reveal(card);
  }
}

function reveal(card) {
  document.getElementById('inner').classList.add('flipped');
  flipped = true;
  drawn.add(card.id);
  updateStats();
  addHistory(card);
  setTimeout(()=>{ busy=false; }, 900);
}

function addHistory(card) {
  document.getElementById('emptyMsg').style.display='none';
  const list = document.getElementById('histList');
  const d    = document.createElement('div');
  d.className = 'h-item';
  let s=''; for(let i=0;i<card.lv;i++) s+='★';
  d.innerHTML = `<div class="h-stars">${s}</div><div class="h-q">${card.q}</div>`;
  list.insertBefore(d, list.firstChild);
}

function reset() {
  if (busy) return;
  drawn.clear(); flipped=false; busy=false;
  document.getElementById('inner').classList.remove('flipped');
  document.getElementById('histList').innerHTML='<div class="empty" id="emptyMsg">還沒有抽過任何卡牌</div>';
  resizeScene();
  updateStats();
}

function setFilter(lv, btn) {
  filter=lv;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  updateStats();
}

function setMode(m) {
  if (m===mode) return;
  mode=m;
  document.body.className=m;
  document.getElementById('titleSub').textContent = m==='solo'
    ? '抽一張卡，說一句真心話'
    : '兩個人的對話，比一個人更深刻';
  document.getElementById('backSym').textContent = m==='solo' ? '心' : '連';
  resizeScene();
}

// init
document.body.className='solo';
resizeScene();
updateStats();
</script>
